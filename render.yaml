services:
  # ─── Next.js Web Service ────────────────────────────────────────────────
  - type: web
    name: skillbenchmark
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: skillbenchmark-redis
          property: connectionString

  # ─── Background Worker (benchmark pipeline) ────────────────────────────
  - type: worker
    name: skillbenchmark-worker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npx tsx worker/src/index.ts
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: skillbenchmark-redis
          property: connectionString

  # ─── Redis (job queue) ─────────────────────────────────────────────────
  - type: keyvalue
    name: skillbenchmark-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []
